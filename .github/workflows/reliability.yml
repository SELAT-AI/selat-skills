name: Reliability probe

# Auto-verify the whole catalogue against its live endpoints and publish
# reliability.json. Uses selat-pay --probe-only (free 402 quote — no signing,
# no payment), so no funded wallet and no secrets are required.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/probe-skills.mjs"
      - ".github/workflows/reliability.yml"

permissions:
  contents: write

concurrency:
  group: reliability
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install selat-pay
        run: npm install -g @selat-ai/selat-pay@^0.3.2

      - name: Probe skills
        env:
          SELAT_ROUTER_URL: https://router.selat.ai
        run: npm run probe

      - name: Commit reliability.json
        run: |
          if git diff --quiet -- reliability.json; then
            echo "reliability.json unchanged"
            exit 0
          fi
          git config user.name "selat-reliability-bot"
          git config user.email "bot@selat.ai"
          git add reliability.json
          git commit -m "chore(reliability): refresh reliability.json [skip ci]"
          git push
